# =============================================================================
# Solana Ecosystem Endpoints Configuration
# =============================================================================
# This file defines all known infrastructure endpoints in the Solana ecosystem.
# Endpoints are organized by provider → cluster → service type → location.
#
# Values can be:
#   - Domain names (resolved via DNS at runtime)
#   - Direct IP:port strings (IP extracted, port stored as metadata)
#   - Dict with {ip: ..., bam_id: ...} for BAM API mapping
#
# BAM endpoints use bam_id to match against explorer.bam.dev/api/v1/nodes
# for reachability verification via API instead of TCP/HTTP checks.
#
# To add a new endpoint: simply add a new line under the appropriate section.
# To add a new provider: create a new top-level block following the same pattern.
#
# Last verified: 2026-02-25
# =============================================================================

